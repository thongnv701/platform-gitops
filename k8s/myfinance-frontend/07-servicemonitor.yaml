apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: myfinance-frontend
  namespace: myfinance-frontend
  labels:
    app.kubernetes.io/name: myfinance-frontend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: myfinance-frontend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
